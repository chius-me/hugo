colorScheme = "blowfish"
defaultAppearance = "light"
autoSwitchAppearance = true

enableSearch = true
enableCodeCopy = true

mainSections = ["posts"]

[header]
  layout = "basic"

[footer]
  showMenu = true
  showCopyright = true
  showThemeAttribution = true
  showAppearanceSwitcher = true
  showScrollToTop = true

[homepage]
  layout = "profile"
  showRecent = true
  showRecentItems = 5
  showMoreLink = false

[article]
  showDate = true
  showViews = false
  showLikes = false
  showAuthor = true
  showBreadcrumbs = false
  showReadingTime = true
  showTableOfContents = true
  showWordCount = true
  showPagination = true
  showTaxonomies = true
  showTags = true

[list]
  showBreadcrumbs = false
  showSummary = false
  groupByYear = true

[taxonomy]
  showTermCount = true

[term]
  groupByYear = false