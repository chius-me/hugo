baseURL = "https://www.tamochi.cn/"
languageCode = "zh-cn"
title = "Blogus Chii"
theme = "PaperMod"
defaultContentLanguage = "zh" 
hasCJKLanguage = true

[params]
env = "production"
author = "Chius"
defaultTheme = "auto"
ShowReadingTime = true
ShowWordCount = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = false
disableThemeToggle = false
ShowRssButtonInSectionTermList = true

[params.profileMode]
enabled = false

[params.homeInfoParams]
Title = "Chius"
Content = "🥰欢迎来到我的个人博客"

[[params.socialIcons]]
name = "githubgithub"
url = "https://github.com/tamochii"

[[params.socialIcons]]
name = "bili"
url = "https://space.bilibili.com/215003532"

[[params.socialIcons]]
name = "giteagitea"
url = "https://git.tamochi.cn/chius"

[[params.socialIcons]]
name = "kofikofi"
url = "https://ko-fi.com/chius"

[menu]

  [[menu.main]]
  identifier = "search"
  name = "搜索"
  url = "/search/"
  weight = 5

  [[menu.main]]
  identifier = "posts"
  name = "文章"
  url = "/posts/"
  weight = 10

  [[menu.main]]
  identifier = "archives"
  name = "归档"
  url = "/archives/"
  weight = 20

  [[menu.main]]
  identifier = "tags"
  name = "标签"
