baseURL = "https://blog.chius.cc/"
languageCode = "zh-cn"
title = "Blogus Chii"
theme = "PaperMod"
defaultContentLanguage = "zh" 
hasCJKLanguage = true

[params]
env = "production"
description = "Chius 的博客"
author = "Chius"
defaultTheme = "light"
ShowToc = true
ShowReadingTime = true
ShowWordCount = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = false
disableThemeToggle = true
ShowRssButtonInSectionTermList = true
ShowCodeCopyButtons = true
smoothScroll = true
ShowFullTextinRSS = true
hideFooter = false

[params.assets]
    favicon = "/favicon.png"

[params.editPost]
URL = "https://github.com/chius-me/hugo/tree/main/content"
Text = "在 GitHub 上编辑此页"
appendFilePath = true

[params.profileMode]
enabled = false

[params.homeInfoParams]
Title = "Chius"
Content = "🥰欢迎来到我的个人博客"

[[params.socialIcons]]
name = "github"
url = "https://github.com/tamochii"

[[params.socialIcons]]
name = "bilibili"
url = "https://space.bilibili.com/215003532"

[[params.socialIcons]]
name = "kofi"
url = "https://ko-fi.com/chius"

[menu]

  [[menu.main]]
  identifier = "violet"
  name = "Violet"
  url = "/violet/"
  weight = 1

  [[menu.main]]
  identifier = "search"
  name = "搜索"
  url = "/search/"
  weight = 5

  [[menu.main]]
  identifier = "posts"
  name = "文章"
  url = "/posts/"
  weight = 10

  [[menu.main]]
  identifier = "archives"
  name = "归档"
  url = "/archives/"
  weight = 20

  [[menu.main]]
  identifier = "tags"
  name = "标签"
  url = "/tags/"
  weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]
