{{/* Spotify now-playing floating button (bottom-right) */}}
{{ $user := .Get "user" | default "chius-fm" }}
{{ $key := .Get "key" | default "5453db9c78d3445aabd2dfc1189ddabc" }}

<div id="spotify-float" class="spotify-float">
  <a id="spotify-float-btn" class="spotify-float-btn" href="https://last.fm/user/chius-fm" target="_blank" title="Last.fm">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    <span id="spotify-float-text"></span>
  </a>
</div>

<style>
.spotify-float {
  position: fixed;
  right: 1.5rem;
  bottom: 1.5rem;
  z-index: 50;
}
.spotify-float-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  border-radius: 9999px;
  background: #1DB954;
  color: #fff;
  text-decoration: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  font-size: 14px;
  font-weight: 500;
  white-space: nowrap;
  max-width: 360px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.spotify-float-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
.spotify-float-btn:hover { transform: scale(1.05); transition: transform 0.2s; }
.spotify-float-btn.playing { animation: sp-pulse 2s infinite; }
@keyframes sp-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(29,185,84,0.4); }
  50% { box-shadow: 0 0 0 10px rgba(29,185,84,0); }
}
</style>

<script>
(function() {
  var api = 'https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=' + {{ $user }}
    + '&api_key=' + {{ $key }} + '&format=json&limit=1';

  var btn = document.getElementById('spotify-float-btn');
  var text = document.getElementById('spotify-float-text');

  function update(url) {
    fetch(url).then(function(r) { return r.json(); }).then(function(d) {
      var t = d.recenttracks && d.recenttracks.track;
      var c = t && (Array.isArray(t) ? t[0] : t);
      if (!c) { btn.style.display = 'none'; return; }
      var playing = c['@attr'] && c['@attr'].nowplaying === 'true';
      var name = c.name || '';
      var artist = (c.artist && (c.artist['#text'] || c.artist.name)) || '';

      if (playing) {
        btn.classList.add('playing');
        text.textContent = '正在听 ' + name + ' - ' + artist;
      } else {
        btn.classList.remove('playing');
        text.textContent = '最近听过 ' + name + ' - ' + artist;
      }
      btn.style.display = 'flex';
    }).catch(function() {});
  }

  update(api);
  setInterval(function() { update(api); }, 30000);
})();
</script>
