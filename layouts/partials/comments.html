<script src="https://giscus.app/client.js"
  data-repo="chius-me/hugo"
  data-repo-id="R_kgDOSV0eUg"
  data-category="Announcements"
  data-category-id="DIC_kwDOSV0eUs4C92l4"
  data-mapping="pathname"
  data-strict="0"
  data-reactions-enabled="1"
  data-emit-metadata="0"
  data-input-position="top"
  data-theme="noborder_light"
  data-lang="zh-CN"
  data-loading="lazy"
  crossorigin="anonymous"
  async>
</script>

<script>
(function() {
  function getTheme() {
    return document.documentElement.classList.contains('dark') ? 'noborder_gray' : 'noborder_light';
  }

  function sendGiscusTheme(theme) {
    var frame = document.querySelector('iframe.giscus-frame');
    if (frame && frame.contentWindow) {
      frame.contentWindow.postMessage({
        giscus: { setConfig: { theme: theme } }
      }, 'https://giscus.app');
    }
  }

  document.addEventListener('DOMContentLoaded', function() {
    sendGiscusTheme(getTheme());
  });

  new MutationObserver(function() {
    sendGiscusTheme(getTheme());
  }).observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
})();
</script>
