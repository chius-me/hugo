name: Integrate Domestic Blog

on:
  push:
    branches:
      - main

concurrency:
  group: integrate-${{ forgejo.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    # Match the runner label that already exists on this Forgejo instance.
    runs-on: ubuntu
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}
    steps:
      # CI stage: checkout -> build Hugo output -> build/push image.
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Initialize theme submodule
        run: git submodule update --init --recursive

      - name: Install Docker CLI and curl
        run: |
          sed -i 's|http://archive.ubuntu.com/ubuntu|https://mirrors.tuna.tsinghua.edu.cn/ubuntu|g; s|http://security.ubuntu.com/ubuntu|https://mirrors.tuna.tsinghua.edu.cn/ubuntu|g' /etc/apt/sources.list.d/ubuntu.sources
          apt-get update
          apt-get install -y --no-install-recommends curl docker.io ca-certificates

      - name: Install Hugo extended
        run: |
          curl -fsSL -o /tmp/hugo.tar.gz "https://github.com/gohugoio/hugo/releases/download/v${{ vars.HUGO_VERSION }}/hugo_extended_${{ vars.HUGO_VERSION }}_linux-amd64.tar.gz"
          tar -xzf /tmp/hugo.tar.gz -C /tmp
          install -m 0755 /tmp/hugo /usr/local/bin/hugo
          hugo version

      - name: Verify Docker daemon access
        run: |
          docker info >/dev/null
          docker version

      - name: Build domestic site output
        run: |
          hugo --minify --baseURL "https://${{ vars.BLOG_DOMAIN }}/" --destination public
          test -f public/index.html

      - name: Derive image tags
        id: image
        run: |
          short_sha="$(printf '%s' '${{ forgejo.sha }}' | cut -c1-12)"
          repo_path="$(printf '%s' '${{ forgejo.repository }}' | tr '[:upper:]' '[:lower:]')"
          image_base="${{ vars.REGISTRY_URL }}/$repo_path"
          echo "image_ref=$image_base:sha-$short_sha" >> "$FORGEJO_OUTPUT"
          echo "image_latest=$image_base:latest" >> "$FORGEJO_OUTPUT"

      - name: Log in to Forgejo container registry
        run: |
          printf '%s' "${{ secrets.HUGO_PUSH_TOKEN }}" | docker login "${{ vars.REGISTRY_URL }}" -u "${{ vars.REGISTRY_USERNAME }}" --password-stdin

      - name: Build image
        run: |
          docker build \
            -t "${{ steps.image.outputs.image_ref }}" \
            -t "${{ steps.image.outputs.image_latest }}" \
            .

      - name: Push immutable image tag
        run: docker push "${{ steps.image.outputs.image_ref }}"

      - name: Push latest image tag
        run: docker push "${{ steps.image.outputs.image_latest }}"

  deploy:
    name: Deploy to Docker host
    needs:
      - build-and-push
    runs-on: ubuntu
    steps:
      # CD stage: prepare SSH -> upload compose assets -> restart container -> wait healthy.
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install SSH client
        run: |
          sed -i 's|http://archive.ubuntu.com/ubuntu|https://mirrors.tuna.tsinghua.edu.cn/ubuntu|g; s|http://security.ubuntu.com/ubuntu|https://mirrors.tuna.tsinghua.edu.cn/ubuntu|g' /etc/apt/sources.list.d/ubuntu.sources
          apt-get update
          apt-get install -y --no-install-recommends openssh-client

      - name: Configure SSH access
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.HUGO_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ vars.DEPLOY_HOST_KEY }}" >> ~/.ssh/known_hosts

      - name: Render remote environment file
        run: |
          cat > deploy/runtime.env <<EOF
          IMAGE_REF=${{ needs.build-and-push.outputs.image_ref }}
          CONTAINER_NAME=${{ vars.CONTAINER_NAME }}
          SERVICE_PORT=${{ vars.SERVICE_PORT }}
          EOF

      - name: Ensure remote deployment directory exists
        run: |
          ssh -p "${{ vars.DEPLOY_PORT }}" "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}" \
            "mkdir -p '${{ vars.DEPLOY_PATH }}'"

      - name: Upload compose assets
        run: |
          scp -P "${{ vars.DEPLOY_PORT }}" \
            deploy/compose.yaml \
            deploy/runtime.env \
            "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}:${{ vars.DEPLOY_PATH }}/"

      - name: Pull and restart container
        run: |
          ssh -p "${{ vars.DEPLOY_PORT }}" "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}" \
            "mv '${{ vars.DEPLOY_PATH }}/runtime.env' '${{ vars.DEPLOY_PATH }}/.env' && \
             docker compose --env-file '${{ vars.DEPLOY_PATH }}/.env' -f '${{ vars.DEPLOY_PATH }}/compose.yaml' pull && \
             docker compose --env-file '${{ vars.DEPLOY_PATH }}/.env' -f '${{ vars.DEPLOY_PATH }}/compose.yaml' up -d"

      - name: Wait for healthy container
        run: |
          ssh -p "${{ vars.DEPLOY_PORT }}" "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}" '
            set -eu
            for attempt in $(seq 1 30); do
              health_state=$(docker inspect -f "{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}" "${{ vars.CONTAINER_NAME }}")
              if [ "$health_state" = healthy ]; then
                exit 0
              fi
              if [ "$health_state" = unhealthy ]; then
                docker logs "${{ vars.CONTAINER_NAME }}"
                exit 1
              fi
              sleep 2
            done
            docker logs "${{ vars.CONTAINER_NAME }}"
            exit 1
          '
